        "name": "Como calcular a rescisão trabalhista em 2026?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Para calcular a rescisão trabalhista em 2026, some as verbas rescisórias: saldo de salário, aviso prévio indenizado, férias proporcionais + 1/3, 13º proporcional e FGTS com multa. Subtraia os descontos de INSS e IRRF sobre as verbas remuneratórias. Use nossa calculadora gratuita para obter o resultado em segundos."
        }
      },
      {
        "@type": "Question",
        "name": "Quem está isento de Imposto de Renda em 2026?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Em 2026, pela Lei nº 15.270/2025, trabalhadores com renda mensal de até R$ 5.000,00 estão isentos de Imposto de Renda. Para rendas entre R$ 5.000,01 e R$ 7.350,00 há redução gradual do IR (redutor progressivo)."
        }
      },
      {
        "@type": "Question",
        "name": "Qual a diferença entre demissão sem justa causa e acordo mútuo?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Na demissão sem justa causa, o trabalhador recebe aviso prévio integral, multa de 40% do FGTS e pode sacar todo o saldo. No acordo mútuo (art. 484-A da CLT), o aviso prévio é reduzido à metade, a multa do FGTS cai para 20% e o saque é limitado a 80% do saldo. Além disso, no acordo mútuo não há direito ao seguro-desemprego."
        }
      },
      {
        "@type": "Question",
        "name": "Qual a tabela do INSS 2026?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "A tabela progressiva do INSS 2026 é: até R$ 1.621,00 = 7,5%; de R$ 1.621,01 a R$ 2.902,84 = 9%; de R$ 2.902,85 a R$ 4.354,27 = 12%; de R$ 4.354,28 a R$ 8.475,55 = 14%. O teto de contribuição é R$ 8.475,55."
        }
      },
      {
        "@type": "Question",
        "name": "Como calcular o seguro-desemprego em 2026?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "O seguro-desemprego é calculado com base na média dos últimos 3 salários. O número de parcelas varia de 3 a 5 conforme o tempo trabalhado e quantas vezes já foi solicitado. Apenas trabalhadores demitidos sem justa causa têm direito ao benefício."
        }
      }
    ]
  }
